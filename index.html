<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Tracker</title>
  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <h1>Gym Tracker</h1>
    </div>
    <div class="topbar-actions">
      <button class="btn ghost" id="btn-export" title="Download a backup of all your data">Export</button>
      <button class="btn ghost" id="btn-import" title="Restore data from a backup file">Import</button>
      <input type="file" id="import-file" accept="application/json" hidden />
    </div>
  </header>

  <main>
    <section id="view-calendar" class="view"></section>
    <section id="view-progress" class="view" hidden></section>
  </main>

  <!-- iOS-style glass tab bar -->
  <nav class="tabbar" role="tablist">
    <button class="tabbar-btn is-active" data-view="calendar" role="tab" aria-selected="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="3"/><path d="M3 9h18M8 2v4M16 2v4"/>
      </svg>
      <span>Calendar</span>
    </button>
    <button class="tabbar-btn" data-view="progress" role="tab" aria-selected="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/>
      </svg>
      <span>Progress</span>
    </button>
  </nav>

  <!-- Day planner overlay -->
  <div id="planner-overlay" class="overlay" hidden>
    <div class="overlay-backdrop" data-close="1"></div>
    <div id="planner-modal" class="modal" role="dialog" aria-modal="true"></div>
  </div>

  <!-- Exercise picker overlay -->
  <div id="picker-overlay" class="overlay" hidden>
    <div class="overlay-backdrop" data-close="1"></div>
    <div id="picker-modal" class="modal small" role="dialog" aria-modal="true"></div>
  </div>

  <script src="js/store.js?v=3"></script>
  <script src="js/cycle.js?v=3"></script>
  <script src="js/calendar.js?v=3"></script>
  <script src="js/planner.js?v=3"></script>
  <script src="js/charts.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
